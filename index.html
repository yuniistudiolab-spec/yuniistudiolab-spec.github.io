<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drop The Beat | 공식 페이지</title>
  <meta name="description" content="Drop The Beat 공식 안내 페이지입니다." />
  <style>
    :root { --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#9ca3af; --accent:#22d3ee; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Noto Sans KR", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a 40%, #111827);
      color: var(--text); min-height: 100vh; display: grid; place-items: center; padding: 24px;
    }
    main {
      width: 100%; max-width: 760px; background: rgba(17,24,39,.9);
      border: 1px solid #1f2937; border-radius: 16px; padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 8px 0; color: var(--muted); line-height: 1.6; }
    .badge {
      display: inline-block; margin-top: 8px; padding: 6px 10px;
      border-radius: 999px; background: #0e7490; color: #ecfeff; font-size: .85rem;
    }
    .links { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
    a {
      text-decoration: none; color: #001018; background: var(--accent);
      padding: 10px 14px; border-radius: 10px; font-weight: 700;
    }
    a.secondary { background: transparent; color: var(--text); border: 1px solid #334155; }
    footer { margin-top: 20px; font-size: .9rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Drop The Beat</h1>
    <span class="badge">Android Rhythm Game</span>
    <p>
      Drop The Beat는 박자에 맞춰 노트를 입력하는 리듬 게임입니다.
      간단한 조작으로 몰입감 있는 비트 플레이를 즐길 수 있습니다.
    </p>
    <p>
      문의 및 정책 확인은 아래 링크를 이용해 주세요.
    </p>

    <div class="links">
      <a href="/privacy.html">개인정보처리방침</a>
      <a class="secondary" href="/app-ads.txt">app-ads.txt</a>
    </div>

    <footer>© 2026 Yuniistudiolab. All rights reserved.</footer>
  </main>
</body>
</html>
